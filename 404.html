<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>手机枪战小游戏</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        #111827;
      background-size: 32px 32px, 32px 32px, auto;
    }
    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }
    .pill {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
    }
    .controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .joystick-zone {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: auto;
    }
    .joystick-base {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 108px;
      height: 108px;
      margin-left: -54px;
      margin-top: -54px;
      border-radius: 50%;
      background: rgba(148, 163, 184, 0.16);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .joystick-stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: 52px;
      margin-left: -26px;
      margin-top: -26px;
      border-radius: 50%;
      background: rgba(96, 165, 250, 0.92);
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.35);
    }
    .shoot-btn {
      position: absolute;
      right: 24px;
      bottom: 28px;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: radial-gradient(circle at 35% 35%, #fb7185, #be123c);
      color: white;
      font-size: 20px;
      font-weight: 800;
      pointer-events: auto;
      box-shadow: 0 12px 28px rgba(190,18,60,0.35);
    }
    .shoot-btn:active { transform: scale(0.96); }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.7);
      padding: 24px;
    }
    .panel {
      width: min(92vw, 460px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      text-align: center;
    }
    .panel h1 { margin: 0 0 12px; font-size: 28px; }
    .panel p { margin: 8px 0; color: #cbd5e1; line-height: 1.5; }
    .panel button {
      margin-top: 14px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }
    .hint {
      position: fixed;
      left: 50%;
      bottom: 140px;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.8);
      border-radius: 999px;
      padding: 8px 14px;
      color: #cbd5e1;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="pill" id="healthText">生命: 100</div>
    <div class="pill" id="scoreText">分数: 0</div>
    <div class="pill" id="waveText">波次: 1</div>
  </div>

  <div class="hint">左下移动，右下开火。桌面端可用 WASD / 方向键 + 空格</div>

  <div class="controls">
    <div class="joystick-zone" id="joystickZone">
      <div class="joystick-base"></div>
      <div class="joystick-stick" id="joystickStick"></div>
    </div>
    <button class="shoot-btn" id="shootBtn">开火</button>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="panel">
      <h1>离线触屏枪战</h1>
      <p>你会自动朝最近的敌人射击。</p>
      <p>目标：尽量生存，击倒更多敌人。</p>
      <button id="startBtn">开始游戏</button>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay" style="display:none;">
    <div class="panel">
      <h1>游戏结束</h1>
      <p id="finalScore">分数: 0</p>
      <p id="finalWave">波次: 1</p>
      <button id="restartBtn">重新开始</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const healthText = document.getElementById('healthText');
    const scoreText = document.getElementById('scoreText');
    const waveText = document.getElementById('waveText');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScore = document.getElementById('finalScore');
    const finalWave = document.getElementById('finalWave');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const joystickZone = document.getElementById('joystickZone');
    const joystickStick = document.getElementById('joystickStick');
    const shootBtn = document.getElementById('shootBtn');

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const state = {
      running: false,
      gameOver: false,
      score: 0,
      wave: 1,
      spawnTimer: 0,
      nextWaveAt: 10,
      shootPressed: false,
      moveX: 0,
      moveY: 0,
      keys: new Set(),
      bullets: [],
      enemies: [],
      particles: [],
      lastTime: 0,
      player: null
    };

    function resetGame() {
      state.score = 0;
      state.wave = 1;
      state.spawnTimer = 0;
      state.nextWaveAt = 10;
      state.gameOver = false;
      state.bullets = [];
      state.enemies = [];
      state.particles = [];
      state.moveX = 0;
      state.moveY = 0;
      state.shootPressed = false;
      state.player = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        r: 16,
        speed: 230,
        health: 100,
        fireCooldown: 0,
        angle: 0,
        flash: 0
      };
      updateHUD();
    }

    function updateHUD() {
      healthText.textContent = `生命: ${Math.max(0, Math.round(state.player.health))}`;
      scoreText.textContent = `分数: ${state.score}`;
      waveText.textContent = `波次: ${state.wave}`;
    }

    function spawnEnemy() {
      const edge = Math.floor(Math.random() * 4);
      let x, y;
      const w = window.innerWidth;
      const h = window.innerHeight;
      if (edge === 0) { x = Math.random() * w; y = -30; }
      if (edge === 1) { x = w + 30; y = Math.random() * h; }
      if (edge === 2) { x = Math.random() * w; y = h + 30; }
      if (edge === 3) { x = -30; y = Math.random() * h; }
      const speed = 45 + Math.random() * 24 + state.wave * 6;
      const hp = 24 + state.wave * 6;
      state.enemies.push({ x, y, r: 14, speed, hp, hitFlash: 0 });
    }

    function nearestEnemy() {
      let best = null;
      let bestDist = Infinity;
      for (const e of state.enemies) {
        const dx = e.x - state.player.x;
        const dy = e.y - state.player.y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) {
          bestDist = d;
          best = e;
        }
      }
      return best;
    }

    function shoot() {
      const target = nearestEnemy();
      const angle = target
        ? Math.atan2(target.y - state.player.y, target.x - state.player.x)
        : state.player.angle;

      state.bullets.push({
        x: state.player.x,
        y: state.player.y,
        vx: Math.cos(angle) * 520,
        vy: Math.sin(angle) * 520,
        r: 5,
        life: 1.2
      });
      state.player.angle = angle;
      state.player.fireCooldown = 0.18;
      state.player.flash = 0.06;
    }

    function updatePlayer(dt) {
      let mx = state.moveX;
      let my = state.moveY;

      if (state.keys.has('arrowleft') || state.keys.has('a')) mx -= 1;
      if (state.keys.has('arrowright') || state.keys.has('d')) mx += 1;
      if (state.keys.has('arrowup') || state.keys.has('w')) my -= 1;
      if (state.keys.has('arrowdown') || state.keys.has('s')) my += 1;

      const len = Math.hypot(mx, my) || 1;
      if (mx || my) {
        state.player.x += (mx / len) * state.player.speed * dt;
        state.player.y += (my / len) * state.player.speed * dt;
      }

      state.player.x = Math.max(state.player.r, Math.min(window.innerWidth - state.player.r, state.player.x));
      state.player.y = Math.max(state.player.r, Math.min(window.innerHeight - state.player.r, state.player.y));

      const target = nearestEnemy();
      if (target) {
        state.player.angle = Math.atan2(target.y - state.player.y, target.x - state.player.x);
      }

      if (state.player.fireCooldown > 0) state.player.fireCooldown -= dt;
      if (state.player.flash > 0) state.player.flash -= dt;

      if ((state.shootPressed || state.keys.has(' ')) && state.player.fireCooldown <= 0) {
        shoot();
      }
    }

    function updateBullets(dt) {
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        if (b.life <= 0 || b.x < -20 || b.x > window.innerWidth + 20 || b.y < -20 || b.y > window.innerHeight + 20) {
          state.bullets.splice(i, 1);
          continue;
        }
        for (let j = state.enemies.length - 1; j >= 0; j--) {
          const e = state.enemies[j];
          const dx = b.x - e.x;
          const dy = b.y - e.y;
          const dist = Math.hypot(dx, dy);
          if (dist < b.r + e.r) {
            e.hp -= 16;
            e.hitFlash = 0.08;
            state.bullets.splice(i, 1);
            for (let k = 0; k < 5; k++) {
              state.particles.push({
                x: e.x,
                y: e.y,
                vx: (Math.random() - 0.5) * 140,
                vy: (Math.random() - 0.5) * 140,
                life: 0.35 + Math.random() * 0.25,
                color: '#fb7185'
              });
            }
            if (e.hp <= 0) {
              state.enemies.splice(j, 1);
              state.score += 1;
              if (state.score >= state.nextWaveAt) {
                state.wave += 1;
                state.nextWaveAt += 10 + state.wave * 2;
              }
            }
            updateHUD();
            break;
          }
        }
      }
    }

    function updateEnemies(dt) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        const dx = state.player.x - e.x;
        const dy = state.player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        e.x += (dx / len) * e.speed * dt;
        e.y += (dy / len) * e.speed * dt;
        if (e.hitFlash > 0) e.hitFlash -= dt;

        if (len < e.r + state.player.r) {
          state.player.health -= 20 * dt;
          if (state.player.health <= 0) {
            state.player.health = 0;
            triggerGameOver();
          }
          updateHUD();
        }
      }
    }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function triggerGameOver() {
      state.running = false;
      state.gameOver = true;
      finalScore.textContent = `分数: ${state.score}`;
      finalWave.textContent = `波次: ${state.wave}`;
      gameOverOverlay.style.display = 'flex';
    }

    function update(dt) {
      if (!state.running) return;

      state.spawnTimer -= dt;
      const spawnInterval = Math.max(0.35, 1.1 - state.wave * 0.06);
      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.spawnTimer = spawnInterval;
      }

      updatePlayer(dt);
      updateBullets(dt);
      updateEnemies(dt);
      updateParticles(dt);
    }

    function drawPlayer() {
      const p = state.player;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);

      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = p.flash > 0 ? '#fde047' : '#e5e7eb';
      ctx.fillRect(4, -4, 24, 8);

      ctx.restore();
    }

    function drawEnemies() {
      for (const e of state.enemies) {
        ctx.fillStyle = e.hitFlash > 0 ? '#fca5a5' : '#ef4444';
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(e.x - 16, e.y - 24, 32, 5);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(e.x - 16, e.y - 24, Math.max(0, Math.min(32, (e.hp / (24 + state.wave * 6)) * 32)), 5);
      }
    }

    function drawBullets() {
      ctx.fillStyle = '#fde047';
      for (const b of state.bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.globalAlpha = Math.max(0, p.life * 2);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      const grad = ctx.createRadialGradient(
        state.player.x, state.player.y, 40,
        state.player.x, state.player.y, Math.max(window.innerWidth, window.innerHeight) * 0.9
      );
      grad.addColorStop(0, 'rgba(59,130,246,0.10)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      drawBullets();
      drawEnemies();
      drawParticles();
      if (state.player) drawPlayer();
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - state.lastTime) / 1000 || 0);
      state.lastTime = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    let joystickPointerId = null;
    const joystick = { active: false, centerX: 75, centerY: 75, x: 0, y: 0, max: 42 };

    function setStickVisual(x, y) {
      joystickStick.style.transform = `translate(${x}px, ${y}px)`;
    }

    function updateJoystick(clientX, clientY) {
      const rect = joystickZone.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const len = Math.hypot(dx, dy);
      if (len > joystick.max) {
        dx = (dx / len) * joystick.max;
        dy = (dy / len) * joystick.max;
      }
      state.moveX = dx / joystick.max;
      state.moveY = dy / joystick.max;
      setStickVisual(dx, dy);
    }

    joystickZone.addEventListener('pointerdown', (e) => {
      joystickPointerId = e.pointerId;
      joystickZone.setPointerCapture(e.pointerId);
      updateJoystick(e.clientX, e.clientY);
    });

    joystickZone.addEventListener('pointermove', (e) => {
      if (e.pointerId !== joystickPointerId) return;
      updateJoystick(e.clientX, e.clientY);
    });

    function releaseJoystick(e) {
      if (e.pointerId !== joystickPointerId) return;
      joystickPointerId = null;
      state.moveX = 0;
      state.moveY = 0;
      setStickVisual(0, 0);
    }

    joystickZone.addEventListener('pointerup', releaseJoystick);
    joystickZone.addEventListener('pointercancel', releaseJoystick);

    shootBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      state.shootPressed = true;
    });
    shootBtn.addEventListener('pointerup', () => state.shootPressed = false);
    shootBtn.addEventListener('pointercancel', () => state.shootPressed = false);
    shootBtn.addEventListener('pointerleave', () => state.shootPressed = false);

    window.addEventListener('keydown', (e) => {
      state.keys.add(e.key.toLowerCase());
      if (e.key === ' ') e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      state.keys.delete(e.key.toLowerCase());
    });

    startBtn.addEventListener('click', () => {
      resetGame();
      state.running = true;
      startOverlay.style.display = 'none';
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
      state.running = true;
      gameOverOverlay.style.display = 'none';
    });

    resetGame();
    draw();
  </script>
</body>
</html>
