<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>手机版主线枪战</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        #111827;
      background-size: 34px 34px, 34px 34px, auto;
    }
    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      z-index: 5;
    }
    .pill {
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 7px 11px;
      backdrop-filter: blur(6px);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls { position: fixed; inset: 0; pointer-events: none; }
    .joystick-zone {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: auto;
    }
    .joystick-base {
      position: absolute;
      left: 50%; top: 50%; width: 108px; height: 108px;
      margin-left: -54px; margin-top: -54px; border-radius: 50%;
      background: rgba(148, 163, 184, 0.16);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .joystick-stick {
      position: absolute;
      left: 50%; top: 50%; width: 52px; height: 52px;
      margin-left: -26px; margin-top: -26px; border-radius: 50%;
      background: rgba(96, 165, 250, 0.92);
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.35);
    }
    .right-panel {
      position: absolute;
      right: 14px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
    }
    .weapon-row {
      display: grid;
      grid-template-columns: repeat(4, 54px);
      gap: 8px;
      pointer-events: auto;
    }
    .weapon-btn, .skill-btn, .shoot-btn {
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-weight: 800;
      pointer-events: auto;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }
    .weapon-btn {
      width: 54px; height: 54px; border-radius: 14px; background: rgba(30,41,59,0.92);
      font-size: 16px;
    }
    .weapon-btn.active { outline: 2px solid #60a5fa; background: rgba(37,99,235,0.95); }
    .weapon-btn.locked { opacity: 0.45; }
    .skill-row {
      display: flex; gap: 10px; align-items: center; pointer-events: auto;
    }
    .skill-btn {
      width: 68px; height: 68px; border-radius: 18px; background: linear-gradient(135deg, #0ea5e9, #2563eb);
      font-size: 14px;
    }
    .shoot-btn {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fb7185, #be123c);
      font-size: 22px;
    }
    .shoot-btn:active, .weapon-btn:active, .skill-btn:active { transform: scale(0.97); }
    .overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(2, 6, 23, 0.7); padding: 24px; z-index: 8;
    }
    .panel {
      width: min(92vw, 520px); background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45); text-align: center;
    }
    .panel h1 { margin: 0 0 12px; font-size: 28px; }
    .panel p { margin: 8px 0; color: #cbd5e1; line-height: 1.5; }
    .panel button {
      margin-top: 14px; padding: 12px 18px; border: 0; border-radius: 12px;
      background: #2563eb; color: white; font-size: 16px; font-weight: 700;
    }
    .hint {
      position: fixed; left: 50%; top: 96px; transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.82); border-radius: 999px; padding: 8px 14px;
      color: #cbd5e1; font-size: 12px; border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none; z-index: 6;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="pill" id="healthText">生命: 100</div>
    <div class="pill" id="weaponText">武器: 步枪</div>
    <div class="pill" id="scoreText">击杀: 0</div>
    <div class="pill" id="gatlingText">加特林: 击杀8人解锁</div>
  </div>

  <div class="hint">左下移动，右下开火；现在已改成大地图 + 镜头跟随视角。</div>

  <div class="controls">
    <div class="joystick-zone" id="joystickZone">
      <div class="joystick-base"></div>
      <div class="joystick-stick" id="joystickStick"></div>
    </div>

    <div class="right-panel">
      <div class="weapon-row">
        <button class="weapon-btn active" id="w1">1</button>
        <button class="weapon-btn" id="w2">2</button>
        <button class="weapon-btn locked" id="w3">3</button>
        <button class="weapon-btn" id="w4">4</button>
      </div>
      <div class="skill-row">
        <button class="skill-btn" id="dashBtn">冲刺</button>
        <button class="skill-btn" id="skillBtn">技能</button>
        <button class="shoot-btn" id="shootBtn">开火</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="panel">
      <h1>手机版主线版</h1>
      <p>保留主线核心：步枪、霰弹枪、加特林、狙击枪。</p>
      <p>加特林击杀 8 人后解锁；狙击枪是真单发。</p>
      <button id="startBtn">开始游戏</button>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay" style="display:none;">
    <div class="panel">
      <h1>游戏结束</h1>
      <p id="finalScore">击杀: 0</p>
      <button id="restartBtn">重新开始</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const healthText = document.getElementById('healthText');
    const weaponText = document.getElementById('weaponText');
    const scoreText = document.getElementById('scoreText');
    const gatlingText = document.getElementById('gatlingText');
    const dashText = document.getElementById('dashText');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScore = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const joystickZone = document.getElementById('joystickZone');
    const joystickStick = document.getElementById('joystickStick');
    const shootBtn = document.getElementById('shootBtn');
    const skillBtn = document.getElementById('skillBtn');
    const dashBtn = document.getElementById('dashBtn');
    const weaponBtns = [document.getElementById('w1'), document.getElementById('w2'), document.getElementById('w3'), document.getElementById('w4')];

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const WEAPONS = {
      rifle: { name: '步枪', fireRate: 0.12, bulletSpeed: 660, damage: 14, spread: 0.03, color: '#fde047', size: 5, pellets: 1, mag: 30, singleTap: false },
      shotgun: { name: '霰弹枪', fireRate: 0.62, bulletSpeed: 560, damage: 8, spread: 0.22, color: '#fb923c', size: 4, pellets: 6, mag: 6, singleTap: false },
      gatling: { name: '加特林', fireRate: 0.04, bulletSpeed: 760, damage: 10, spread: 0.05, color: '#fbbf24', size: 4, pellets: 1, mag: 999, singleTap: false },
      sniper: { name: '狙击枪', fireRate: 1.0, bulletSpeed: 980, damage: 52, spread: 0.002, color: '#7dd3fc', size: 4, pellets: 1, mag: 5, singleTap: true }
    };

    const state = {
      running: false,
      gameOver: false,
      score: 0,
      shootPressed: false,
      moveX: 0,
      moveY: 0,
      bullets: [],
      enemies: [],
      particles: [],
      lastTime: 0,
      player: null,
      spawnTimer: 0,
      shotLatch: false,
      gatlingUnlocked: false,
      gatlingActive: false,
      gatlingTimer: 0,
      skillCooldown: 0,
      dashCooldown: 0,
      worldWidth: 2600,
      worldHeight: 1800,
      camX: 0,
      camY: 0
    };

    function resetGame() {
      state.score = 0;
      state.gameOver = false;
      state.shootPressed = false;
      state.moveX = 0;
      state.moveY = 0;
      state.bullets = [];
      state.enemies = [];
      state.particles = [];
      state.spawnTimer = 0;
      state.shotLatch = false;
      state.gatlingUnlocked = false;
      state.gatlingActive = false;
      state.gatlingTimer = 0;
      state.skillCooldown = 0;
      state.player = {
        x: state.worldWidth / 2,
        y: state.worldHeight / 2,
        r: 16,
        speed: 230,
        health: 100,
        fireCooldown: 0,
        angle: 0,
        flash: 0,
        weapon: 'rifle',
        dashTime: 0
      };
      state.camX = Math.max(0, Math.min(state.worldWidth - window.innerWidth, state.player.x - window.innerWidth / 2));
      state.camY = Math.max(0, Math.min(state.worldHeight - window.innerHeight, state.player.y - window.innerHeight / 2));
      updateHUD();
      syncWeaponButtons();
    }

    function updateHUD() {
      const p = state.player;
      healthText.textContent = `生命: ${Math.max(0, Math.round(p.health))}`;
      weaponText.textContent = `武器: ${WEAPONS[p.weapon].name}`;
      scoreText.textContent = `击杀: ${state.score}`;
      if (state.gatlingActive) gatlingText.textContent = `加特林: ${state.gatlingTimer.toFixed(1)} 秒`;
      else gatlingText.textContent = state.gatlingUnlocked ? '加特林: 已解锁（点3启动）' : '加特林: 击杀8人解锁';
      skillBtn.textContent = state.skillCooldown <= 0 ? '技能' : `${state.skillCooldown.toFixed(1)}s`;
      dashBtn.textContent = state.dashCooldown <= 0 ? '冲刺' : `${state.dashCooldown.toFixed(1)}s`;
      dashText.textContent = state.dashCooldown <= 0 ? '冲刺: 就绪' : `冲刺: ${state.dashCooldown.toFixed(1)} 秒`; 
    }

    function syncWeaponButtons() {
      weaponBtns.forEach((btn, i) => btn.classList.remove('active'));
      if (state.player.weapon === 'rifle') weaponBtns[0].classList.add('active');
      if (state.player.weapon === 'shotgun') weaponBtns[1].classList.add('active');
      if (state.player.weapon === 'gatling') weaponBtns[2].classList.add('active');
      if (state.player.weapon === 'sniper') weaponBtns[3].classList.add('active');
      weaponBtns[2].classList.toggle('locked', !state.gatlingUnlocked && !state.gatlingActive);
    }

    function spawnEnemy() {
      const edge = Math.floor(Math.random() * 4);
      let x, y;
      const minX = Math.max(40, state.camX - 120);
      const maxX = Math.min(state.worldWidth - 40, state.camX + window.innerWidth + 120);
      const minY = Math.max(40, state.camY - 120);
      const maxY = Math.min(state.worldHeight - 40, state.camY + window.innerHeight + 120);
      if (edge === 0) { x = minX + Math.random() * (maxX - minX); y = Math.max(20, state.camY - 40); }
      if (edge === 1) { x = Math.min(state.worldWidth - 20, state.camX + window.innerWidth + 40); y = minY + Math.random() * (maxY - minY); }
      if (edge === 2) { x = minX + Math.random() * (maxX - minX); y = Math.min(state.worldHeight - 20, state.camY + window.innerHeight + 40); }
      if (edge === 3) { x = Math.max(20, state.camX - 40); y = minY + Math.random() * (maxY - minY); }
      x = Math.max(20, Math.min(state.worldWidth - 20, x));
      y = Math.max(20, Math.min(state.worldHeight - 20, y));
      const speed = 46 + Math.random() * 24 + Math.min(70, state.score * 1.2);
      const hp = 24 + Math.floor(state.score / 3) * 6;
      state.enemies.push({ x, y, r: 14, speed, hp, maxHp: hp, hitFlash: 0 });
    }

    function nearestEnemy() {
      let best = null;
      let bestDist = Infinity;
      for (const e of state.enemies) {
        const dx = e.x - state.player.x;
        const dy = e.y - state.player.y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) {
          bestDist = d;
          best = e;
        }
      }
      return best;
    }

    function switchWeapon(key) {
      if (key === 'gatling') {
        if (!state.gatlingUnlocked && !state.gatlingActive) return;
        if (state.gatlingUnlocked && !state.gatlingActive) {
          state.gatlingActive = true;
          state.gatlingTimer = 10;
        }
      }
      state.player.weapon = key;
      state.shotLatch = false;
      syncWeaponButtons();
      updateHUD();
    }

    function shoot() {
      const w = WEAPONS[state.player.weapon];
      const target = nearestEnemy();
      const angle = target ? Math.atan2(target.y - state.player.y, target.x - state.player.x) : state.player.angle;
      state.player.angle = angle;
      state.player.fireCooldown = w.fireRate;
      state.player.flash = 0.08;
      for (let i = 0; i < (w.name === '加特林' ? 2 : 4); i++) {
        state.particles.push({ x: state.player.x + Math.cos(angle) * 18, y: state.player.y + Math.sin(angle) * 18, vx: Math.cos(angle) * (120 + Math.random()*60) + (Math.random()-0.5)*60, vy: Math.sin(angle) * (120 + Math.random()*60) + (Math.random()-0.5)*60, life: 0.08 + Math.random() * 0.08, color: '#fde68a' });
      }
      for (let i = 0; i < w.pellets; i++) {
        const a = angle + (Math.random() - 0.5) * w.spread;
        state.bullets.push({
          x: state.player.x,
          y: state.player.y,
          vx: Math.cos(a) * w.bulletSpeed,
          vy: Math.sin(a) * w.bulletSpeed,
          r: w.size,
          life: 1.2,
          damage: w.damage,
          color: w.color
        });
      }
    }

    function dash() {
      if (state.dashCooldown > 0 || !state.running) return;
      const len = Math.hypot(state.moveX, state.moveY);
      let dx = len > 0 ? state.moveX / len : Math.cos(state.player.angle);
      let dy = len > 0 ? state.moveY / len : Math.sin(state.player.angle);
      state.player.x += dx * 120;
      state.player.y += dy * 120;
      state.player.x = Math.max(state.player.r, Math.min(state.worldWidth - state.player.r, state.player.x));
      state.player.y = Math.max(state.player.r, Math.min(state.worldHeight - state.player.r, state.player.y));
      state.player.dashTime = 0.18;
      state.dashCooldown = 3.0;
      for (let i = 0; i < 10; i++) {
        state.particles.push({ x: state.player.x, y: state.player.y, vx: (Math.random() - 0.5) * 200, vy: (Math.random() - 0.5) * 200, life: 0.22 + Math.random() * 0.18, color: '#60a5fa' });
      }
      updateHUD();
    }

    function castSkill() {
      if (state.skillCooldown > 0 || !state.running) return;
      state.skillCooldown = 6;
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        const dx = e.x - state.player.x;
        const dy = e.y - state.player.y;
        const d = Math.hypot(dx, dy);
        if (d < 140) {
          e.hp -= 24;
          e.hitFlash = 0.12;
          if (e.hp <= 0) {
            state.enemies.splice(i, 1);
            state.score += 1;
          }
        }
      }
      updateUnlocks();
      updateHUD();
    }

    function updateUnlocks() {
      if (!state.gatlingUnlocked && state.score >= 8) {
        state.gatlingUnlocked = true;
        syncWeaponButtons();
      }
    }

    function updatePlayer(dt) {
      let mx = state.moveX;
      let my = state.moveY;
      const len = Math.hypot(mx, my) || 1;
      let speed = state.player.speed;
      if (state.player.dashTime > 0) speed *= 2.2;
      if (mx || my) {
        state.player.x += (mx / len) * speed * dt;
        state.player.y += (my / len) * speed * dt;
      }
      state.player.x = Math.max(state.player.r, Math.min(state.worldWidth - state.player.r, state.player.x));
      state.player.y = Math.max(state.player.r, Math.min(state.worldHeight - state.player.r, state.player.y));
      const target = nearestEnemy();
      if (target) state.player.angle = Math.atan2(target.y - state.player.y, target.x - state.player.x);
      if (state.player.fireCooldown > 0) state.player.fireCooldown -= dt;
      if (state.player.flash > 0) state.player.flash -= dt;
      if (state.player.dashTime > 0) state.player.dashTime -= dt;
      if (state.skillCooldown > 0) state.skillCooldown -= dt;
      if (state.dashCooldown > 0) state.dashCooldown -= dt;
      if (state.gatlingActive) {
        state.gatlingTimer -= dt;
        if (state.gatlingTimer <= 0) {
          state.gatlingActive = false;
          state.gatlingTimer = 0;
          state.player.weapon = 'rifle';
          syncWeaponButtons();
        }
      }
      const weapon = WEAPONS[state.player.weapon];
      if (state.shootPressed && state.player.fireCooldown <= 0) {
        if (weapon.singleTap) {
          if (!state.shotLatch) {
            shoot();
            state.shotLatch = true;
          }
        } else {
          shoot();
        }
      }
    }

    function updateBullets(dt) {
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        if (b.life <= 0 || b.x < -20 || b.x > state.worldWidth + 20 || b.y < -20 || b.y > state.worldHeight + 20) {
          state.bullets.splice(i, 1);
          continue;
        }
        for (let j = state.enemies.length - 1; j >= 0; j--) {
          const e = state.enemies[j];
          const dx = b.x - e.x;
          const dy = b.y - e.y;
          if (Math.hypot(dx, dy) < b.r + e.r) {
            e.hp -= b.damage;
            e.hitFlash = 0.08;
            state.bullets.splice(i, 1);
            for (let k = 0; k < 6; k++) {
              state.particles.push({ x: e.x, y: e.y, vx: (Math.random() - 0.5) * 140, vy: (Math.random() - 0.5) * 140, life: 0.35 + Math.random() * 0.25, color: b.color });
            }
            if (e.hp <= 0) {
              state.enemies.splice(j, 1);
              state.score += 1;
              updateUnlocks();
            }
            updateHUD();
            break;
          }
        }
      }
    }

    function updateEnemies(dt) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        const dx = state.player.x - e.x;
        const dy = state.player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        e.x += (dx / len) * e.speed * dt;
        e.y += (dy / len) * e.speed * dt;
        if (e.hitFlash > 0) e.hitFlash -= dt;
        if (len < e.r + state.player.r) {
          state.player.health -= 20 * dt;
          if (state.player.health <= 0) {
            state.player.health = 0;
            triggerGameOver();
          }
          updateHUD();
        }
      }
    }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function triggerGameOver() {
      state.running = false;
      state.gameOver = true;
      finalScore.textContent = `击杀: ${state.score}`;
      gameOverOverlay.style.display = 'flex';
    }

    function update(dt) {
      if (!state.running) return;
      state.spawnTimer -= dt;
      const spawnInterval = Math.max(0.33, 1.0 - Math.min(0.55, state.score * 0.015));
      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.spawnTimer = spawnInterval;
      }
      updatePlayer(dt);
      updateBullets(dt);
      updateEnemies(dt);
      updateParticles(dt);
      const targetCamX = Math.max(0, Math.min(state.worldWidth - window.innerWidth, state.player.x - window.innerWidth / 2));
      const targetCamY = Math.max(0, Math.min(state.worldHeight - window.innerHeight, state.player.y - window.innerHeight / 2));
      state.camX += (targetCamX - state.camX) * Math.min(1, dt * 8);
      state.camY += (targetCamY - state.camY) * Math.min(1, dt * 8);
    }

    function drawPlayer(camX, camY) {
      const p = state.player;
      ctx.save();
      ctx.translate(p.x - camX, p.y - camY);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.dashTime > 0 ? '#93c5fd' : '#60a5fa';
      ctx.beginPath(); ctx.arc(0, 0, p.r + (p.dashTime > 0 ? 2 : 0), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = p.flash > 0 ? '#ffffff' : '#e5e7eb';
      ctx.fillRect(4, -4, p.weapon === 'gatling' ? 28 : 24, 8);
      if (p.flash > 0) {
        ctx.fillStyle = 'rgba(255,240,160,0.85)';
        ctx.beginPath();
        ctx.moveTo(28, 0);
        ctx.lineTo(40, -6);
        ctx.lineTo(40, 6);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawEnemies(camX, camY) {
      for (const e of state.enemies) {
        ctx.fillStyle = e.hitFlash > 0 ? '#fca5a5' : '#ef4444';
        ctx.beginPath(); ctx.arc(e.x - camX, e.y - camY, e.r, 0, Math.PI * 2); ctx.fill();
        if (e.hitFlash > 0) { ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke(); }
        ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(e.x - camX - 16, e.y - camY - 24, 32, 5);
        ctx.fillStyle = '#22c55e'; ctx.fillRect(e.x - camX - 16, e.y - camY - 24, Math.max(0, Math.min(32, (e.hp / e.maxHp) * 32)), 5);
      }
    }

    function drawBullets(camX, camY) {
      for (const b of state.bullets) {
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x - camX, b.y - camY, b.r, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawParticles(camX, camY) {
      for (const p of state.particles) {
        ctx.globalAlpha = Math.max(0, p.life * 2);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x - camX, p.y - camY, 2.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawCrosshair() {
      const x = window.innerWidth * 0.72;
      const y = window.innerHeight * 0.38;
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 10, y); ctx.lineTo(x + 10, y);
      ctx.moveTo(x, y - 10); ctx.lineTo(x, y + 10);
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      const camX = state.camX;
      const camY = state.camY;

      const grid = 34;
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let x = -(camX % grid); x < window.innerWidth; x += grid) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, window.innerHeight); ctx.stroke();
      }
      for (let y = -(camY % grid); y < window.innerHeight; y += grid) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(window.innerWidth, y); ctx.stroke();
      }

      for (let i = 0; i < 16; i++) {
        const px = ((i * 157) % state.worldWidth) - camX;
        const py = ((i * 211) % state.worldHeight) - camY;
        ctx.fillStyle = 'rgba(34,197,94,0.10)';
        ctx.beginPath(); ctx.arc(px, py, 18 + (i % 4) * 6, 0, Math.PI * 2); ctx.fill();
      }

      const grad = ctx.createRadialGradient(window.innerWidth / 2, window.innerHeight / 2, 40, window.innerWidth / 2, window.innerHeight / 2, Math.max(window.innerWidth, window.innerHeight) * 0.9);
      grad.addColorStop(0, 'rgba(59,130,246,0.08)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      drawBullets(camX, camY);
      drawEnemies(camX, camY);
      drawParticles(camX, camY);
      if (state.player) drawPlayer(camX, camY);
      drawCrosshair();
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - state.lastTime) / 1000 || 0);
      state.lastTime = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    let joystickPointerId = null;
    const joystick = { max: 42 };
    function setStickVisual(x, y) { joystickStick.style.transform = `translate(${x}px, ${y}px)`; }
    function updateJoystick(clientX, clientY) {
      const rect = joystickZone.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const len = Math.hypot(dx, dy);
      if (len > joystick.max) { dx = (dx / len) * joystick.max; dy = (dy / len) * joystick.max; }
      state.moveX = dx / joystick.max;
      state.moveY = dy / joystick.max;
      setStickVisual(dx, dy);
    }
    joystickZone.addEventListener('pointerdown', (e) => { joystickPointerId = e.pointerId; joystickZone.setPointerCapture(e.pointerId); updateJoystick(e.clientX, e.clientY); });
    joystickZone.addEventListener('pointermove', (e) => { if (e.pointerId !== joystickPointerId) return; updateJoystick(e.clientX, e.clientY); });
    function releaseJoystick(e) { if (e.pointerId !== joystickPointerId) return; joystickPointerId = null; state.moveX = 0; state.moveY = 0; setStickVisual(0, 0); }
    joystickZone.addEventListener('pointerup', releaseJoystick);
    joystickZone.addEventListener('pointercancel', releaseJoystick);

    shootBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); state.shootPressed = true; });
    shootBtn.addEventListener('pointerup', () => { state.shootPressed = false; state.shotLatch = false; });
    shootBtn.addEventListener('pointercancel', () => { state.shootPressed = false; state.shotLatch = false; });
    shootBtn.addEventListener('pointerleave', () => { state.shootPressed = false; state.shotLatch = false; });
    dashBtn.addEventListener('click', dash);
    skillBtn.addEventListener('click', castSkill);
    weaponBtns[0].addEventListener('click', () => switchWeapon('rifle'));
    weaponBtns[1].addEventListener('click', () => switchWeapon('shotgun'));
    weaponBtns[2].addEventListener('click', () => switchWeapon('gatling'));
    weaponBtns[3].addEventListener('click', () => switchWeapon('sniper'));

    startBtn.addEventListener('click', () => { resetGame(); state.running = true; startOverlay.style.display = 'none'; });
    restartBtn.addEventListener('click', () => { resetGame(); state.running = true; gameOverOverlay.style.display = 'none'; });

    resetGame();
    draw();
  </script>
</body>
</html>
